<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gradientHermes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle decoration -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradientHermes)" stroke-width="1.5" opacity="0.3" stroke-dasharray="5 3" />
  
  <!-- Outer glowing hexagon hexagon -->
  <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="url(#gradientHermes)" stroke-width="3" filter="url(#glow)" />
  
  <!-- Central stylized 'H' -->
  <path d="M35,32 L35,68 M65,32 L65,68 M35,50 L65,50" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Glowing orbit dot -->
  <circle cx="50" cy="15" r="4.5" fill="#06b6d4" filter="url(#glow)" />
</svg>
